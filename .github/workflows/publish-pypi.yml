name: Publish Python Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate tag/version match
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python - <<'PY'
import tomllib
from pathlib import Path
p = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
print(p['project']['version'])
PY
)"
          echo "Tag version: ${TAG_VERSION}"
          echo "Package version: ${PKG_VERSION}"
          test "${TAG_VERSION}" = "${PKG_VERSION}"

      - name: Build distributions
        run: python -m build --outdir packages

      - name: Twine check
        run: python -m twine check packages/*

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: packages/*

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: packages

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi-manual:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: packages

      - name: Publish to PyPI (manual)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-pypi-tag:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: packages

      - name: Publish to PyPI (tag)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
